services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      - MYSQL_DATABASE=EduGameFy
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - docker_mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    mem_limit: 1g
    cpus: 0.5
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - PMA_ARBITRARY=1
    depends_on:
      mysql:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5

  python_backend:
    build:
      context: ./BackEnd
    container_name: python_backend
    command: daphne -b 0.0.0.0 -p 8000 backend.asgi:application
    volumes:
      - ./BackEnd:/app
    ports:
      - "8000:8000"
    environment:
      - MYSQL_DATABASE=EduGameFy
      - MYSQL_USER=Edgar
      - MYSQL_PASSWORD=root
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      # ── AWS S3 ──────────────────────────
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - AWS_S3_REGION=${AWS_S3_REGION}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 2g
    cpus: 1.0

  react_native_app:
    build:
      context: ./mobile
    container_name: react_native_app
    command: npx expo start --web --port 8081
    volumes:
      - ./mobile:/app
      - /app/node_modules
    ports:
      - "19000:19000"
      - "19001:19001"
      - "8081:8081"
    stdin_open: true
    tty: true
    mem_limit: 2g
    cpus: 1.0

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
       - "6379:6379"
    restart: always

volumes:
  docker_mysql_data: