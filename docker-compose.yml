services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      - MYSQL_DATABASE=EduGameFy
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - docker_mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    mem_limit: 1g       # máximo 1 GB de RAM
    cpus: 0.5           # medio núcleo de CPU

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - PMA_ARBITRARY=1
    depends_on:
      - mysql
    mem_limit: 512m     # máximo 512 MB de RAM
    cpus: 0.5           # medio núcleo de CPU

  python_backend:
    build:
      context: ./BackEnd
    container_name: python_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./BackEnd:/app
    ports:
      - "8000:8000"
    environment:
      - MYSQL_DATABASE=EduGameFy
      - MYSQL_USER=Edgar
      - MYSQL_PASSWORD=root
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
    depends_on:
      - mysql
    mem_limit: 2g       # máximo 2 GB de RAM
    cpus: 1.0           # un núcleo de CPU

  react_native_app:
    build:
      context: ./mobile
    container_name: react_native_app
    command: npx expo start --web --port 8081
    volumes:
      - ./mobile:/app
      - /app/node_modules
    ports:
      - "19000:19000"
      - "19001:19001"
      - "8081:8081"
    stdin_open: true
    tty: true
    mem_limit: 2g       # máximo 2 GB de RAM
    cpus: 1.0           # un núcleo de CPU

volumes:
  docker_mysql_data:
